<h2>User Registration</h2>

<label>Name:</label>

<input
type="text"
[(ngModel)]="name">

<br><br>

<label>Age:</label>

<input
type="number"
[(ngModel)]="age">

<br><br>

<button (click)="saveData()">
Submit
</button>

<hr>

<h3>Live Preview</h3>

<p>Name: {{ name }}</p>
<p>Age: {{ age }}</p>

<hr>

<h3>Submitted Data</h3>

<p>Name: {{ submittedName }}</p>
<p>Age: {{ submittedAge }}</p>
